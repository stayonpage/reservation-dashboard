name: 예약 메일 폴링

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: 네이버 메일 폴링
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://reservation-dashboard-pi.vercel.app/api/cron/poll-naver"
      - name: 지메일(스테이폴리오·아임웹) 메일 폴링
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://reservation-dashboard-pi.vercel.app/api/cron/poll-gmail"
      - name: 스테이폴리오 예약 재확인(취소 감지)
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://reservation-dashboard-pi.vercel.app/api/cron/reconcile-stayfolio"
